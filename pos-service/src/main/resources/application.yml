spring:
  application:
    name: pos-service
  config:
    import: "optional:configserver:${CONFIG_SERVER}"

  cloud:
    config:
      fail-fast: true
      retry:
        initial-interval: 5000
        max-attempts: 20
        max-interval: 30000
        multiplier: 1.5

pos:
  base-url: http://
  puerto: 8080/

file:
  path: ${DATA_SAVED_PATH}