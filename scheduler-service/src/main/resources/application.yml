spring:
  application:
    name: scheduler-service
  config:
    import: optional:configserver:${CONFIG_SERVER:http://localhost:8888}
  cloud:
    config:
      fail-fast: true
      retry:
        initial-interval: 5000
        max-attempts: 20
        max-interval: 30000
        multiplier: 1.5

cron:
  sync_products: ${CRON_SYNC_PRODUCTS}
  sync_orders: ${CRON_SYNC_ORDERS}